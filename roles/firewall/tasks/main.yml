---
- name: Ensure `proxmox-firewall` is Installed
  ansible.builtin.package:
    name: proxmox-firewall
    state: present
  notify: Start `proxmox-firewall` Service
- name: Ensure Exists {{ firewall_root_dir }}
  ansible.builtin.stat:
    path: '{{ firewall_root_dir }}'
  register: firewall_etc_dir
- name: Create Directory {{ firewall_root_dir }}
  ansible.builtin.file:
    path: '{{ firewall_root_dir }}'
    state: directory
    mode: '0600'
  when: not firewall_etc_dir.stat.exists
- name: Write `cluster.fw` into pmxcfs
  ansible.builtin.include_role:
    name: pmxcfs
    tasks_from: write_template.yml
  vars:
    pmxcfs_write_src: cluster.fw.j2
    pmxcfs_write_dest: '{{ firewall_root_dir }}/cluster.fw'
    pmxcfs_write_notify: Restart `proxmox-firewall` Service
- name: Ensure Exists {{ firewall_node_dir }}
  ansible.builtin.stat:
    path: '{{ firewall_node_dir }}'
  register: firewall_etc_node_dir
- name: Create Directory {{ firewall_node_dir }}
  ansible.builtin.file:
    path: '{{ firewall_node_dir }}'
    state: directory
    mode: '0600'
  when: not firewall_etc_node_dir.stat.exists
- name: Write `host.fw` into pmxcfs
  ansible.builtin.include_role:
    name: pmxcfs
    tasks_from: write.yml
  vars:
    pmxcfs_write_src: host.fw
    pmxcfs_write_dest: '{{ firewall_node_dir }}/host.fw'
    pmxcfs_write_notify: Restart `proxmox-firewall` Service
